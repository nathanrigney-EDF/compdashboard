name: Daily Intelligence Refresh

on:
  schedule:
    # 10:00 UTC = 6:00 AM ET (EST) / 5:00 AM ET (EDT)
    - cron: '0 10 * * *'
  workflow_dispatch:  # Allow manual trigger from GitHub UI

permissions:
  contents: write  # Needed to commit updated data files

jobs:
  fetch-and-deploy:
    name: Fetch News & Deploy Dashboard
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Fetch competitor news
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          SAM_GOV_API_KEY: ${{ secrets.SAM_GOV_API_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          DIGEST_EMAIL_TO: ${{ secrets.DIGEST_EMAIL_TO }}
          DIGEST_EMAIL_FROM: ${{ secrets.DIGEST_EMAIL_FROM }}
        run: |
          python scripts/fetch_news.py

      - name: Commit updated data files
        run: |
          git config user.name "Intel Bot"
          git config user.email "intel-bot@github-actions"
          git add data/news.json data/digest.json
          # Only commit if there are changes
          git diff --cached --quiet || git commit -m "chore: daily intel refresh $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push

      - name: Upload digest artifact (for debugging)
        uses: actions/upload-artifact@v4
        with:
          name: daily-digest
          path: data/digest.json
          retention-days: 7
